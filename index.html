<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">

  <title>Songlap Ai</title>

  <meta name="description" content="Songlap Ai powered by SLX-1.6 is a modern, fast and free Bangla Ai chat assistant. Simple conversations, real solutions.">
  <meta name="author" content="JR Torikul Islam">
  <meta name="keywords" content="Bangla Ai, Bengali Chatbot, Songlap Ai, Free AI Chat, AI Assistant, Bangla Chatbot">

  <meta property="og:title" content="Songlap Ai - আপনার ডিজিটাল সহকারী">
  <meta property="og:description" content="Modern, fast and free Bangla AI chat assistant. Simple conversations, real solutions.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/assets/preview.png">
  <meta property="og:url" content="https://songlap.netlify.app/">

  <meta name="theme-color" content="#0f172a">

  <link rel="icon" href="/assets/favicon.ico">
  <link rel="apple-touch-icon" href="/assets/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="shortcut icon" href="img/logo.png">
  <link rel="apple-touch-icon" href="img/logo.png">
</head>

<body>
    <div id="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-sidebar-btn" class="new-chat-btn">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    <span>New Chat</span>
                </button>
            </div>
            
            <div class="sidebar-version-badge">
                <span class="version-label">Version</span>
                <span class="version-number">v2.1</span>
            </div>

            <div class="sidebar-version-badge model-info">
                <span class="version-label">Model</span>
                <span class="version-number">SLX-1.6</span>
            </div>

            <div class="history-label">Recent History</div>
            <div id="chat-history-list" class="history-list">
                <!-- History items injected here -->
            </div>

            <div class="sidebar-footer">
                <button id="clear-history-btn" class="sidebar-action-btn">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    <span>Clear Chats</span>
                </button>
                <div class="sidebar-credit">
                    <span>Crafted with ❤️ by</span>
                    <a href="https://jrtkl.netlify.app/" target="_blank">JR Torikul Islam</a>
                </div>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div id="main-wrapper">
            <header>
                <div class="header-content">
                    <div class="header-left">
                        <button id="menu-toggle" class="icon-btn" aria-label="Toggle Menu">
                            <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                        </button>
                        <div class="brand-group">
                            <img src="img/logo.png" alt="Songlap Ai" class="header-logo">
                            <div class="brand-info">
                                <h1 class="brand-name">Songlap Ai</h1>
                                <span class="model-badge">
                                    <svg width="8" height="8" viewBox="0 0 8 8" fill="currentColor" style="margin-right: 4px;"><circle cx="4" cy="4" r="3"></circle></svg>
                                    SLX-1.6
                                </span>
                            </div>
                        </div>
                    </div>
                    <div class="header-right">
                        <button id="new-chat-top-btn" class="icon-btn" aria-label="New Chat" title="New Chat">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        </button>
                        <button id="theme-btn" class="icon-btn" aria-label="Toggle Theme" title="Toggle Theme">
                            <div class="theme-icons">
                                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                            </div>
                        </button>
                    </div>
                </div>
            </header>

            <main id="chat-container">
                <div id="welcome-screen">
                    <div class="welcome-content">
                        <h2 class="welcome-title">I'm Songlap Ai. How can I help?</h2>
                        <p class="welcome-subtitle">Your professional AI assistant for smart conversations.</p>
                        <div class="suggestions-grid">
                            <button class="chip" onclick="setInput('Who are you?')">
                                <span class="chip-text">About Songlap Ai</span>
                                <span class="chip-desc">Explore capabilities and advanced features.</span>
                            </button>
                            <button class="chip" onclick="setInput('About Your Developer')">
                                <span class="chip-text">The Developer</span>
                                <span class="chip-desc">Discover the story and technical person behind Songlap Ai.</span>
                            </button>
                            <button class="chip" onclick="setInput('Full Stack Developer Roadmap')">
                                <span class="chip-text">Career Roadmap</span>
                                <span class="chip-desc">Detailed guide for Full Stack Engineering path.</span>
                            </button>
                            <button class="chip" onclick="setInput('Could you write this email for me?')">
                                <span class="chip-text">Content Assistant</span>
                                <span class="chip-desc">Professional drafting and writing support.</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="chat-feed"></div>
            </main>

            <div id="input-area">
                <div class="input-wrapper">
                    <div id="stop-btn-container" style="display: none;">
                        <button id="stop-btn" class="stop-btn">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><rect x="6" y="6" width="12" height="12"></rect></svg>
                            Stop Generation
                        </button>
                    </div>
                    <div class="input-container">
                        <textarea id="message-input" placeholder="Ask Songlap..." rows="1"></textarea>
                        <div class="input-actions">
                            <button id="send-btn" class="send-btn" disabled>
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                    <div class="input-footer-text">Songlap Ai helps you, but important decisions should be double-checked.</div>
                </div>
            </div>
        </div>
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>

    Cache-Control = "public, max-age=31536000, immutable"

  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" -->
